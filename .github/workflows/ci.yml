name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set Image Tag
      run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | \
        docker login --username AWS --password-stdin ${{ secrets.ECR_REPO }}

    - name: Build Docker Image
      run: |
        docker build -t app:$IMAGE_TAG ./app

    - name: Tag Image
      run: |
        docker tag app:$IMAGE_TAG ${{ secrets.ECR_REPO }}:$IMAGE_TAG

    - name: Push Image
      run: |
        docker push ${{ secrets.ECR_REPO }}:$IMAGE_TAG

    - name: Update Kubernetes Manifest
      run: |
        sed -i "s|IMAGE_TAG|$IMAGE_TAG|g" k8s/deployment.yml

    - name: Commit & Push Changes
      run: |
        git config --global user.email "ci@github.com"
        git config --global user.name "github-actions"
        git add k8s/deployment.yml
        git commit -m "Update image to $IMAGE_TAG"
        git push